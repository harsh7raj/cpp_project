apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-ha-scripts
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins-ha.labels" . | nindent 4 }}
data:
{{- range $path, $_ := .Files.Glob "files/scripts/*.sh" }}
  {{ base $path }}: |
{{ $.Files.Get $path | indent 4 }}
{{- end }}
