{{- if .Values.rbac.create -}}
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ .Values.rbac.roleName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins-ha.labels" . | nindent 4 }}
rules:
  # Leader election: read, create, update the Lease
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "create", "update", "patch", "list", "watch"]
  # Label own pod for Service selector routing
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "patch"]
  # Emit events for observability
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
{{- end }}
