apiVersion: coordination.k8s.io/v1
kind: Lease
metadata:
  name: {{ .Values.leaderElection.leaseName }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins-ha.labels" . | nindent 4 }}
  {{- if .Values.leaderElection.keepOnUninstall }}
  annotations:
    helm.sh/resource-policy: keep
  {{- end }}
spec:
  leaseDurationSeconds: {{ .Values.leaderElection.leaseDurationSeconds }}
