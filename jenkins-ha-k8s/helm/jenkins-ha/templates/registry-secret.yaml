{{- if and .Values.imagePullSecret.enabled (not .Values.imagePullSecret.existingSecret) -}}
{{- if or (not .Values.imagePullSecret.registry) (not .Values.imagePullSecret.username) (not .Values.imagePullSecret.password) -}}
{{- fail "imagePullSecret.enabled=true but registry/username/password are missing. Provide them via --set or values.yaml, or set imagePullSecret.existingSecret to reference a pre-existing Secret." -}}
{{- end -}}
{{- $auth := printf "%s:%s" .Values.imagePullSecret.username .Values.imagePullSecret.password | b64enc -}}
{{- $entry := dict "username" .Values.imagePullSecret.username "password" .Values.imagePullSecret.password "auth" $auth -}}
{{- if .Values.imagePullSecret.email -}}
{{- $_ := set $entry "email" .Values.imagePullSecret.email -}}
{{- end -}}
{{- $config := dict "auths" (dict .Values.imagePullSecret.registry $entry) -}}
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.imagePullSecret.name }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins-ha.labels" . | nindent 4 }}
type: kubernetes.io/dockerconfigjson
data:
  .dockerconfigjson: {{ $config | toJson | b64enc }}
{{- end }}
