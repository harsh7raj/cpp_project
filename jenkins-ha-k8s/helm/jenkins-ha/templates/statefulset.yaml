apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: jenkins
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "jenkins-ha.labels" . | nindent 4 }}
spec:
  serviceName: jenkins-headless
  replicas: {{ .Values.replicaCount }}
  podManagementPolicy: {{ .Values.statefulset.podManagementPolicy }}
  selector:
    matchLabels:
      {{- include "jenkins-ha.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "jenkins-ha.selectorLabels" . | nindent 8 }}
      annotations:
        # Roll pods when scripts ConfigMap changes
        checksum/scripts: {{ include (print $.Template.BasePath "/configmap-scripts.yaml") . | sha256sum }}
    spec:
      serviceAccountName: {{ include "jenkins-ha.serviceAccountName" . }}
      terminationGracePeriodSeconds: {{ .Values.statefulset.terminationGracePeriodSeconds }}
      {{- include "jenkins-ha.imagePullSecrets" . | nindent 6 }}

      {{- if .Values.statefulset.podAntiAffinity.enabled }}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
            - weight: {{ .Values.statefulset.podAntiAffinity.weight }}
              podAffinityTerm:
                labelSelector:
                  matchExpressions:
                    - key: app
                      operator: In
                      values:
                        - jenkins
                topologyKey: {{ .Values.statefulset.podAntiAffinity.topologyKey }}
      {{- end }}

      securityContext:
        runAsUser: {{ .Values.securityContext.runAsUser }}
        runAsGroup: {{ .Values.securityContext.runAsGroup }}
        fsGroup: {{ .Values.securityContext.fsGroup }}

      volumes:
        - name: jenkins-home
          persistentVolumeClaim:
            claimName: {{ .Values.persistence.name }}
        - name: ha-signal
          emptyDir: {}
        - name: scripts
          configMap:
            name: jenkins-ha-scripts
            defaultMode: 0755

      initContainers:
        - name: fix-permissions
          image: "{{ .Values.image.init.repository }}:{{ .Values.image.init.tag }}"
          imagePullPolicy: {{ .Values.image.init.pullPolicy }}
          command: ["sh", "-c", "chown -R {{ .Values.securityContext.runAsUser }}:{{ .Values.securityContext.runAsGroup }} /var/jenkins_home"]
          securityContext:
            runAsUser: 0
          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home

      containers:
        # ── Container 1: Jenkins ──────────────────────────────────────────
        - name: jenkins
          image: "{{ .Values.image.jenkins.repository }}:{{ .Values.image.jenkins.tag }}"
          imagePullPolicy: {{ .Values.image.jenkins.pullPolicy }}
          command: ["/bin/bash", "/scripts/jenkins-guard.sh"]

          ports:
            - name: http
              containerPort: {{ .Values.service.httpPort }}
              protocol: TCP
            - name: agent
              containerPort: {{ .Values.service.agentPort }}
              protocol: TCP

          env:
            - name: ROLE_FILE
              value: /var/run/jenkins-ha/role
            - name: JAVA_OPTS
              value: {{ .Values.jenkins.javaOpts | quote }}

          volumeMounts:
            - name: jenkins-home
              mountPath: /var/jenkins_home
            - name: ha-signal
              mountPath: /var/run/jenkins-ha
            - name: scripts
              mountPath: /scripts

          livenessProbe:
            exec:
              command: ["/bin/bash", "/scripts/liveness.sh"]
            initialDelaySeconds: {{ .Values.jenkins.livenessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.jenkins.livenessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.jenkins.livenessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.jenkins.livenessProbe.failureThreshold }}
          readinessProbe:
            exec:
              command: ["/bin/bash", "/scripts/readiness.sh"]
            initialDelaySeconds: {{ .Values.jenkins.readinessProbe.initialDelaySeconds }}
            periodSeconds: {{ .Values.jenkins.readinessProbe.periodSeconds }}
            timeoutSeconds: {{ .Values.jenkins.readinessProbe.timeoutSeconds }}
            failureThreshold: {{ .Values.jenkins.readinessProbe.failureThreshold }}

          lifecycle:
            preStop:
              exec:
                command:
                  - /bin/bash
                  - -c
                  - |
                    echo "standby" > /var/run/jenkins-ha/role
                    sleep 5

          resources:
            {{- toYaml .Values.jenkins.resources | nindent 12 }}

        # ── Container 2: Leader Elector Sidecar ──────────────────────────
        - name: leader-elector
          image: "{{ .Values.image.sidecar.repository }}:{{ .Values.image.sidecar.tag }}"
          imagePullPolicy: {{ .Values.image.sidecar.pullPolicy }}
          command: ["/bin/bash", "/scripts/leader-elector.sh"]

          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_UID
              valueFrom:
                fieldRef:
                  fieldPath: metadata.uid
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: LEASE_NAME
              value: {{ .Values.leaderElection.leaseName | quote }}
            - name: LEASE_DURATION
              value: {{ .Values.leaderElection.leaseDurationSeconds | quote }}
            - name: RENEW_INTERVAL
              value: {{ .Values.leaderElection.renewIntervalSeconds | quote }}
            - name: RETRY_INTERVAL
              value: {{ .Values.leaderElection.retryIntervalSeconds | quote }}
            - name: ROLE_FILE
              value: /var/run/jenkins-ha/role

          volumeMounts:
            - name: ha-signal
              mountPath: /var/run/jenkins-ha
            - name: scripts
              mountPath: /scripts

          resources:
            {{- toYaml .Values.sidecar.resources | nindent 12 }}
