apiVersion: v1
kind: ConfigMap
metadata:
  name: jenkins-ha-scripts
  namespace: jenkins
  labels:
    app: jenkins
data:
  leader-elector.sh: |
    #!/usr/bin/env bash
    # leader-elector.sh — Lease-based leader election for Jenkins HA.
    # Identity = POD_NAME/POD_UID so a restarted pod with the same name
    # but a new UID will never mistake an old lease for its own.
    set -euo pipefail

    POD_NAME="${POD_NAME:?POD_NAME must be set}"
    POD_UID="${POD_UID:?POD_UID must be set}"
    POD_NAMESPACE="${POD_NAMESPACE:?POD_NAMESPACE must be set}"
    LEASE_NAME="${LEASE_NAME:-jenkins-leader}"
    LEASE_DURATION="${LEASE_DURATION:-15}"
    RENEW_INTERVAL="${RENEW_INTERVAL:-5}"
    RETRY_INTERVAL="${RETRY_INTERVAL:-2}"
    ROLE_FILE="${ROLE_FILE:-/var/run/jenkins-ha/role}"
    MAX_API_FAILURES="${MAX_API_FAILURES:-3}"

    IDENTITY="${POD_NAME}/${POD_UID}"

    consecutive_failures=0
    current_role="standby"

    log() { echo "[elector] $(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

    write_role() {
      local role="$1"
      echo "$role" > "$ROLE_FILE"
      if [ "$current_role" != "$role" ]; then
        log "Role transition: $current_role -> $role"
        current_role="$role"
      fi
    }

    label_pod() {
      local role="$1"
      kubectl label pod "$POD_NAME" -n "$POD_NAMESPACE" \
        jenkins-role="$role" --overwrite 2>/dev/null || true
    }

    epoch_seconds() { date +%s; }

    parse_time() {
      local ts="$1"
      date -d "$ts" +%s 2>/dev/null || echo 0
    }

    get_lease() {
      kubectl get lease "$LEASE_NAME" -n "$POD_NAMESPACE" \
        -o jsonpath='{.spec.holderIdentity}|{.spec.renewTime}|{.spec.acquireTime}' 2>/dev/null
    }

    create_lease_if_missing() {
      if ! kubectl get lease "$LEASE_NAME" -n "$POD_NAMESPACE" &>/dev/null; then
        log "Lease $LEASE_NAME does not exist, creating it..."
        kubectl apply -f - <<LEASEEOF
    apiVersion: coordination.k8s.io/v1
    kind: Lease
    metadata:
      name: ${LEASE_NAME}
      namespace: ${POD_NAMESPACE}
    spec:
      leaseDurationSeconds: ${LEASE_DURATION}
    LEASEEOF
        log "Lease created."
      fi
    }

    try_acquire() {
      local now_iso
      now_iso="$(date -u '+%Y-%m-%dT%H:%M:%S.000000Z')"
      kubectl patch lease "$LEASE_NAME" -n "$POD_NAMESPACE" --type=merge \
        -p "{\"spec\":{\"holderIdentity\":\"${IDENTITY}\",\"leaseDurationSeconds\":${LEASE_DURATION},\"acquireTime\":\"${now_iso}\",\"renewTime\":\"${now_iso}\"}}" \
        2>/dev/null
    }

    renew_lease() {
      local now_iso
      now_iso="$(date -u '+%Y-%m-%dT%H:%M:%S.000000Z')"
      kubectl patch lease "$LEASE_NAME" -n "$POD_NAMESPACE" --type=merge \
        -p "{\"spec\":{\"renewTime\":\"${now_iso}\"}}" \
        2>/dev/null
    }

    verify_holder() {
      local holder
      holder="$(kubectl get lease "$LEASE_NAME" -n "$POD_NAMESPACE" \
        -o jsonpath='{.spec.holderIdentity}' 2>/dev/null)"
      [ "$holder" = "$IDENTITY" ]
    }

    clear_lease() {
      log "Clearing lease holder (graceful shutdown)..."
      kubectl patch lease "$LEASE_NAME" -n "$POD_NAMESPACE" --type=merge \
        -p '{"spec":{"holderIdentity":null}}' 2>/dev/null || true
    }

    become_standby() {
      write_role "standby"
      label_pod "standby"
    }

    become_active() {
      write_role "active"
      label_pod "active"
      log "I am the leader. identity=$IDENTITY"
    }

    self_fence() {
      log "FENCING: cannot reach API ($consecutive_failures failures). Assuming lost leadership."
      become_standby
    }

    cleanup() {
      log "Caught termination signal."
      if [ "$current_role" = "active" ]; then
        clear_lease
      fi
      become_standby
      exit 0
    }

    trap cleanup SIGTERM SIGINT EXIT

    log "Starting leader elector: pod=$POD_NAME uid=$POD_UID identity=$IDENTITY"
    log "Settings: duration=${LEASE_DURATION}s, renew=${RENEW_INTERVAL}s, retry=${RETRY_INTERVAL}s"

    mkdir -p "$(dirname "$ROLE_FILE")"
    write_role "standby"
    label_pod "standby"
    create_lease_if_missing

    while true; do
      lease_data="$(get_lease)" || {
        consecutive_failures=$((consecutive_failures + 1))
        log "API call failed ($consecutive_failures/$MAX_API_FAILURES)"
        if [ "$consecutive_failures" -ge "$MAX_API_FAILURES" ]; then
          self_fence
        fi
        sleep "$RETRY_INTERVAL"
        continue
      }

      consecutive_failures=0
      IFS='|' read -r holder renew_time acquire_time <<< "$lease_data"

      # Am I the current holder (exact instance match via UID)?
      if [ "$holder" = "$IDENTITY" ]; then
        if renew_lease; then
          if [ "$current_role" != "active" ]; then
            become_active
          fi
          sleep "$RENEW_INTERVAL"
          continue
        else
          consecutive_failures=$((consecutive_failures + 1))
          log "Renew failed ($consecutive_failures/$MAX_API_FAILURES)"
          if [ "$consecutive_failures" -ge "$MAX_API_FAILURES" ]; then
            self_fence
          fi
          sleep "$RETRY_INTERVAL"
          continue
        fi
      fi

      # Is the lease free or expired?
      lease_free=false

      if [ -z "$holder" ]; then
        lease_free=true
        log "Lease has no holder. Attempting acquisition..."
      elif [ -n "$renew_time" ]; then
        renew_epoch="$(parse_time "$renew_time")"
        now_epoch="$(epoch_seconds)"
        age=$((now_epoch - renew_epoch))
        if [ "$age" -gt "$LEASE_DURATION" ]; then
          lease_free=true
          log "Lease expired (age=${age}s > duration=${LEASE_DURATION}s, holder=$holder). Attempting acquisition..."
        fi
      else
        lease_free=true
        log "Lease has no renewTime. Attempting acquisition..."
      fi

      if [ "$lease_free" = "true" ]; then
        if try_acquire; then
          sleep 0.5
          if verify_holder; then
            become_active
            sleep "$RENEW_INTERVAL"
            continue
          else
            log "Lost acquisition race. Another pod claimed the lease."
            become_standby
          fi
        else
          log "Acquisition patch failed."
        fi
      else
        if [ "$current_role" != "standby" ]; then
          log "Another instance ($holder) holds the lease. Becoming standby."
          become_standby
        fi
      fi

      sleep "$RETRY_INTERVAL"
    done

  jenkins-guard.sh: |
    #!/usr/bin/env bash
    # jenkins-guard.sh — Wraps Jenkins lifecycle around role file.
    set -uo pipefail

    ROLE_FILE="${ROLE_FILE:-/var/run/jenkins-ha/role}"
    POLL_INTERVAL="${GUARD_POLL_INTERVAL:-2}"
    JENKINS_PID=""

    log() { echo "[guard] $(date -u '+%Y-%m-%dT%H:%M:%SZ') $*"; }

    get_role() {
      if [ -f "$ROLE_FILE" ]; then
        cat "$ROLE_FILE" 2>/dev/null | tr -d '[:space:]'
      else
        echo "standby"
      fi
    }

    start_jenkins() {
      log "Starting Jenkins..."
      /usr/local/bin/jenkins.sh &
      JENKINS_PID=$!
      log "Jenkins started with PID=$JENKINS_PID"
    }

    stop_jenkins() {
      if [ -n "$JENKINS_PID" ] && kill -0 "$JENKINS_PID" 2>/dev/null; then
        log "Stopping Jenkins (PID=$JENKINS_PID)..."
        kill -TERM "$JENKINS_PID" 2>/dev/null || true
        local count=0
        while kill -0 "$JENKINS_PID" 2>/dev/null && [ "$count" -lt 30 ]; do
          sleep 1
          count=$((count + 1))
        done
        if kill -0 "$JENKINS_PID" 2>/dev/null; then
          log "Jenkins did not stop gracefully, sending SIGKILL..."
          kill -9 "$JENKINS_PID" 2>/dev/null || true
        fi
        log "Jenkins stopped."
        JENKINS_PID=""
      fi
    }

    cleanup() {
      log "Caught termination signal."
      stop_jenkins
      exit 0
    }

    trap cleanup SIGTERM SIGINT

    log "Guard starting. Watching role file: $ROLE_FILE"
    log "Waiting for role=active..."

    jenkins_running=false

    while true; do
      role="$(get_role)"

      if [ "$role" = "active" ]; then
        if [ "$jenkins_running" = false ]; then
          start_jenkins
          jenkins_running=true
        fi
        if [ -n "$JENKINS_PID" ] && ! kill -0 "$JENKINS_PID" 2>/dev/null; then
          log "Jenkins process died unexpectedly. Restarting..."
          jenkins_running=false
          JENKINS_PID=""
          sleep 2
          continue
        fi
      else
        if [ "$jenkins_running" = true ]; then
          log "Role changed to '$role'. Shutting down Jenkins to prevent split-brain."
          stop_jenkins
          jenkins_running=false
        fi
      fi

      sleep "$POLL_INTERVAL"
    done

  readiness.sh: |
    #!/usr/bin/env bash
    ROLE_FILE="${ROLE_FILE:-/var/run/jenkins-ha/role}"
    role="$(cat "$ROLE_FILE" 2>/dev/null | tr -d '[:space:]')"
    if [ "$role" != "active" ]; then
      exit 1
    fi
    curl -sf -o /dev/null --max-time 5 http://localhost:8080/login 2>/dev/null
    exit $?

  liveness.sh: |
    #!/usr/bin/env bash
    ROLE_FILE="${ROLE_FILE:-/var/run/jenkins-ha/role}"
    role="$(cat "$ROLE_FILE" 2>/dev/null | tr -d '[:space:]')"
    if [ "$role" != "active" ]; then
      exit 0
    fi
    curl -sf -o /dev/null --max-time 5 http://localhost:8080/login 2>/dev/null
    exit $?
