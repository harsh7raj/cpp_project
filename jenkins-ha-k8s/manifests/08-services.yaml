# Main Service: routes traffic ONLY to the active pod via label selector
apiVersion: v1
kind: Service
metadata:
  name: jenkins
  namespace: jenkins
  labels:
    app: jenkins
spec:
  type: ClusterIP
  selector:
    app: jenkins
    jenkins-role: active       # ← Only the leader pod matches
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: agent
      port: 50000
      targetPort: 50000
      protocol: TCP
---
# Headless Service: required by StatefulSet for stable DNS names (jenkins-0.jenkins-headless, etc.)
apiVersion: v1
kind: Service
metadata:
  name: jenkins-headless
  namespace: jenkins
  labels:
    app: jenkins
spec:
  clusterIP: None
  selector:
    app: jenkins
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
    - name: agent
      port: 50000
      targetPort: 50000
      protocol: TCP
